<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEBIS Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>QEBIS Dashboard</h1>
    </header>
    <section id="degChartContainer" aria-labelledby="degChartHeader">
        <h2 id="degChartHeader">Degree Chart</h2>
        <canvas id="degChart"></canvas>
    </section>
    <section id="nyquistContainer" aria-labelledby="nyquistHeader">
        <h2 id="nyquistHeader">Nyquist Chart</h2>
        <canvas id="nyquistChart"></canvas>
    </section>
    <section id="stageContainer" aria-labelledby="stageHeader">
        <h2 id="stageHeader">Stage Chart</h2>
        <canvas id="stageChart"></canvas>
    </section>
    <footer>
        <p>Dashboard generated on <span id="currentDate"></span>.</p>
    </footer>
    <script>
        document.getElementById("currentDate").innerText = new Date().toUTCString();

        function validateData(data) {
            // Perform data validation
            return Array.isArray(data) && data.length > 0;
        }

        function renderChart(chartId, data) {
            const ctx = document.getElementById(chartId).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Data',
                        data: data.values,
                        borderColor: 'rgba(75, 192, 192, 1)',
                        fill: false,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: true,
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function handleChartData(chartId, fetchUrl) {
            fetch(fetchUrl)
                .then(response => response.json())
                .then(data => {
                    if (validateData(data)) {
                        renderChart(chartId, data);
                    } else {
                        console.error('Invalid data received for ' + chartId);
                    }
                })
                .catch(error => {
                    console.error('Error fetching data for ' + chartId, error);
                });
        }

        handleChartData('degChart', '/api/deg-data');
        handleChartData('nyquistChart', '/api/nyquist-data');
        handleChartData('stageChart', '/api/stage-data');
    </script>
</body>
</html>
